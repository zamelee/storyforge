<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" width="1100" height="620"><style>
    text { font-family: 'SF Mono', 'Cascadia Code', 'Consolas', 'Menlo', 'Monaco', 'Courier New', monospace; fill: #334155; }
  .bg { fill: #ffffff; }
  .title { font-size: 18px; font-weight: 700; fill: #0f172a; }
  .subtitle { font-size: 11px; font-weight: 400; fill: #475569; }
  .h2 { font-size: 12px; font-weight: 600; fill: #1e293b; }
  .h3 { font-size: 10px; font-weight: 600; fill: #1e293b; }
  .label { font-size: 10px; font-weight: 500; fill: #1e293b; }
  .small { font-size: 9px; font-weight: 400; fill: #475569; }
  .tiny { font-size: 8px; font-weight: 400; fill: #64748b; }
</style><rect class="bg" width="1100" height="620"/><text x="20" y="28" class="title" text-anchor="start" fill="#0f172a">#05 open-canvas 模式：ArtifactV3 多版本快照</text><text x="20" y="44" class="subtitle" text-anchor="start">灵感反推采纳：增加后悔药，支持回退到上一版本</text><line x1="20" y1="52" x2="1080" y2="52" stroke="#334155" stroke-width="1"/><text x="20" y="80" class="h2" text-anchor="start" fill="#22d3ee">▍数据结构：state.history 数组 + state.currentIndex 游标</text><rect x="30" y="100" width="600" height="80" rx="6" fill="rgba(248,250,252,0.8)" stroke="#334155" stroke-width="1.2"/><text x="44" y="120" class="label" text-anchor="start" fill="#fbbf24">history: [</text><text x="44" y="138" class="small" text-anchor="start" fill="#475569">  { id: "v1", label: "初始灵感",   data: { roles:[…], relations:[…] }, ts: 09:30 },</text><text x="44" y="154" class="small" text-anchor="start" fill="#475569">  { id: "v2", label: "AI 扩展",     data: { roles:[…], relations:[…] }, ts: 09:35 },</text><text x="44" y="170" class="small" text-anchor="start" fill="#34d399">  { id: "v3", label: "手动追加",    data: { roles:[…], relations:[…] }, ts: 09:42 }   ← currentIndex = 2</text><text x="74" y="186" class="label" text-anchor="start" fill="#fbbf24">]</text><rect x="30" y="220" width="600" height="70" rx="8" fill="rgba(248,250,252,0.8)" stroke="#334155" stroke-width="1.2"/><text x="44" y="242" class="label" text-anchor="start" fill="#22d3ee">UI 控件：  ◀ 上一版  |  [v3 / v3] v2/3  |  下一版 ▶  |  🗑 丢弃当前  |  ✓ 采纳此版</text><text x="44" y="262" class="small" text-anchor="start" fill="#475569">键盘快捷键：  Ctrl+Z 回到上一版  ·  Ctrl+Shift+Z 前进  ·  Esc 放弃</text><text x="44" y="280" class="small" text-anchor="start" fill="#fb7185">边界规则：currentIndex !== length-1 时点击「采纳」→ confirm("将丢弃未来的版本")</text><text x="20" y="320" class="h2" text-anchor="start" fill="#a78bfa">▍状态转移图（用户操作 → 状态变化）</text><rect x="80" y="360" width="160" height="64" rx="8" fill="rgba(241,245,249,0.7)" stroke="#475569" stroke-width="1.5"/><text x="160" y="378" class="small" text-anchor="middle" fill="#475569">Initial</text><text x="160" y="392" class="small" text-anchor="middle" fill="#475569">(history=[v1],</text><text x="160" y="406" class="small" text-anchor="middle" fill="#475569">idx=0)</text><rect x="270" y="360" width="160" height="64" rx="8" fill="rgba(241,245,249,0.7)" stroke="#22d3ee" stroke-width="1.5"/><text x="350" y="378" class="small" text-anchor="middle" fill="#22d3ee">After AI</text><text x="350" y="392" class="small" text-anchor="middle" fill="#22d3ee">(history=[v1,v2],</text><text x="350" y="406" class="small" text-anchor="middle" fill="#22d3ee">idx=1)</text><rect x="460" y="360" width="160" height="64" rx="8" fill="rgba(241,245,249,0.7)" stroke="#34d399" stroke-width="1.5"/><text x="540" y="378" class="small" text-anchor="middle" fill="#34d399">After Manual</text><text x="540" y="392" class="small" text-anchor="middle" fill="#34d399">(history=[v1,v2,v3],</text><text x="540" y="406" class="small" text-anchor="middle" fill="#34d399">idx=2) ★</text><rect x="650" y="360" width="160" height="64" rx="8" fill="rgba(241,245,249,0.7)" stroke="#fbbf24" stroke-width="1.5"/><text x="730" y="378" class="small" text-anchor="middle" fill="#fbbf24">Undo</text><text x="730" y="392" class="small" text-anchor="middle" fill="#fbbf24">(history=[v1,v2,v3],</text><text x="730" y="406" class="small" text-anchor="middle" fill="#fbbf24">idx=1)</text><rect x="840" y="360" width="160" height="64" rx="8" fill="rgba(241,245,249,0.7)" stroke="#a78bfa" stroke-width="1.5"/><text x="920" y="378" class="small" text-anchor="middle" fill="#a78bfa">Redo</text><text x="920" y="392" class="small" text-anchor="middle" fill="#a78bfa">(history=[v1,v2,v3],</text><text x="920" y="406" class="small" text-anchor="middle" fill="#a78bfa">idx=2)</text><line x1="240" y1="392" x2="264" y2="392" stroke="#22d3ee" stroke-width="1.5"/><polygon points="270,392 264,396 264,388" fill="#22d3ee"/><text x="255" y="384" class="small" text-anchor="middle" fill="#22d3ee">AI 生成</text><line x1="430" y1="392" x2="454" y2="392" stroke="#34d399" stroke-width="1.5"/><polygon points="460,392 454,396 454,388" fill="#34d399"/><text x="445" y="384" class="small" text-anchor="middle" fill="#34d399">手动追加</text><line x1="620" y1="392" x2="644" y2="392" stroke="#fbbf24" stroke-width="1.5"/><polygon points="650,392 644,396 644,388" fill="#fbbf24"/><text x="635" y="384" class="small" text-anchor="middle" fill="#fbbf24">Ctrl+Z</text><line x1="810" y1="392" x2="834" y2="392" stroke="#a78bfa" stroke-width="1.5"/><polygon points="840,392 834,396 834,388" fill="#a78bfa"/><text x="825" y="384" class="small" text-anchor="middle" fill="#a78bfa">Ctrl+Shift+Z</text><line x1="460" y1="432" x2="86" y2="432" stroke="#22d3ee" stroke-width="1.5"/><polygon points="80,432 86,428 86,436" fill="#22d3ee"/><text x="280" y="425" class="small" text-anchor="middle" fill="#22d3ee">✓ 采纳此版  →  写入 characterRelations（不可逆）</text><rect x="20" y="470" width="1060" height="130" rx="8" fill="rgba(34,211,238,0.10)" stroke="#22d3ee" stroke-width="1.2"/><text x="40" y="492" class="h3" text-anchor="start" fill="#22d3ee">✓ 关键设计原则（open-canvas 借鉴）</text><text x="40" y="510" class="small" text-anchor="start">1. 不可变快照：history[i].data 存的是完整 frozen 对象，切换 idx 只换引用</text><text x="40" y="526" class="small" text-anchor="start">2. 时间线分支：Undo 后再编辑 → 截断未来（slice(0, idx+1) 后 push），符合 Git 语义</text><text x="40" y="542" class="small" text-anchor="start">3. 持久化：history 存到 localStorage 单独 key（不污染 IndexedDB），容量警告 5MB</text><text x="40" y="558" class="small" text-anchor="start">4. 不破坏现有：灵感反推 onAccept 仍然一次性写入；只新增 history.onSnapshot() 钩子</text><text x="40" y="574" class="small" text-anchor="start">5. 草稿保护：关闭窗口前若 idx !== length-1 → beforeunload 提示</text><text x="40" y="590" class="small" text-anchor="start" fill="#a78bfa">🧠 借鉴 open-canvas 5.5k★ 的 ArtifactV3 模式，但只引入 history[] 概念，不复制整个 graph 渲染层</text></svg>