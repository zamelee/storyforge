</style><rect class="bg" width="1400" height="1100"/><text x="20" y="28" class="title" text-anchor="start">#B v2.0 修改后架构 · 8 项改动标记</text><text x="20" y="44" class="subtitle" text-anchor="start">StoryForge 纯前端（不变）· 内部 8 处变动 · 改动颜色：🟢新增 / 🟡改造 / 🔵保留</text><line x1="20" y1="52" x2="1380" y2="52" stroke="#cbd5e1" stroke-width="1"/><rect x="40" y="80" width="700" height="30" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/><text x="56" y="100" class="h3" text-anchor="start">图例：</text><rect x="120" y="88" width="18" height="14" rx="3" fill="#dcfce7" stroke="#059669" stroke-width="1"/><text x="144" y="100" class="small" text-anchor="start" fill="#059669">NEW 新增</text><rect x="240" y="88" width="18" height="14" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1"/><text x="264" y="100" class="small" text-anchor="start" fill="#d97706">MOD 改造</text><rect x="360" y="88" width="18" height="14" rx="3" fill="#e0f2fe" stroke="#0891b2" stroke-width="1"/><text x="384" y="100" class="small" text-anchor="start" fill="#0891b2">KEEP 保留</text><rect x="480" y="88" width="18" height="14" rx="3" fill="#fee2e2" stroke="#e11d48" stroke-width="1"/><text x="504" y="100" class="small" text-anchor="start" fill="#e11d48">FIX 修复</text><text x="40" y="130" class="h2" text-anchor="start" fill="#7c3aed">① UI 层（React 组件）</text><text x="420" y="130" class="h2" text-anchor="start" fill="#0891b2">② Store 层（Zustand）</text><text x="800" y="130" class="h2" text-anchor="start" fill="#059669">③ 持久层（IndexedDB / Dexie）</text><text x="1220" y="130" class="h2" text-anchor="start" fill="#d97706">④ LLM + Prompt + 新增 history</text><rect x="40" y="150" width="130" height="50" rx="6" fill="#e0f2fe" stroke="#0891b2" stroke-width="1.2"/><text x="105" y="172" class="small" text-anchor="middle" fill="#0891b2">WorkspacePage</text><text x="105" y="188" class="tiny" text-anchor="middle" fill="#475569">components/</text><rect x="132" y="140" width="36" height="14" rx="3" fill="#f8fafc" stroke="#0891b2" stroke-width="1"/><text x="150" y="150" class="tiny" text-anchor="middle" fill="#0891b2">KEEP</text><rect x="40" y="215" width="130" height="50" rx="6" fill="#e0f2fe" stroke="#0891b2" stroke-width="1.2"/><text x="105" y="237" class="small" text-anchor="middle" fill="#0891b2">CharacterPanel</text><text x="105" y="253" class="tiny" text-anchor="middle" fill="#475569">components/</text><rect x="132" y="205" width="36" height="14" rx="3" fill="#f8fafc" stroke="#0891b2" stroke-width="1"/><text x="150" y="215" class="tiny" text-anchor="middle" fill="#0891b2">KEEP</text><rect x="40" y="280" width="130" height="50" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.2"/><text x="105" y="302" class="small" text-anchor="middle" fill="#d97706">CharacterRelationPanel</text><text x="105" y="318" class="tiny" text-anchor="middle" fill="#475569">+Cards Drawer UI</text><rect x="132" y="270" width="36" height="14" rx="3" fill="#f8fafc" stroke="#d97706" stroke-width="1"/><text x="150" y="280" class="tiny" text-anchor="middle" fill="#d97706">MOD</text><rect x="40" y="345" width="130" height="50" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.2"/><text x="105" y="367" class="small" text-anchor="middle" fill="#d97706">RelationGraph</text><text x="105" y="383" class="tiny" text-anchor="middle" fill="#475569">+isDirectedType()</text><rect x="132" y="335" width="36" height="14" rx="3" fill="#f8fafc" stroke="#d97706" stroke-width="1"/><text x="150" y="345" class="tiny" text-anchor="middle" fill="#d97706">MOD</text><rect x="40" y="410" width="130" height="50" rx="6" fill="#e0f2fe" stroke="#0891b2" stroke-width="1.2"/><text x="105" y="432" class="small" text-anchor="middle" fill="#0891b2">AIConfigPanel</text><text x="105" y="448" class="tiny" text-anchor="middle" fill="#475569">components/</text><rect x="132" y="400" width="36" height="14" rx="3" fill="#f8fafc" stroke="#0891b2" stroke-width="1"/><text x="150" y="410" class="tiny" text-anchor="middle" fill="#0891b2">KEEP</text><rect x="40" y="475" width="130" height="50" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.2"/><text x="105" y="497" class="small" text-anchor="middle" fill="#d97706">InspirationPage</text><text x="105" y="513" class="tiny" text-anchor="middle" fill="#475569">+历史快照 UI</text><rect x="132" y="465" width="36" height="14" rx="3" fill="#f8fafc" stroke="#d97706" stroke-width="1"/><text x="150" y="475" class="tiny" text-anchor="middle" fill="#d97706">MOD</text><rect x="40" y="540" width="130" height="50" rx="6" fill="#dcfce7" stroke="#059669" stroke-width="1.2"/><text x="105" y="562" class="small" text-anchor="middle" fill="#059669">HistoryNavigator</text><text x="105" y="578" class="tiny" text-anchor="middle" fill="#475569">+components/inspiration/</text><rect x="132" y="530" width="36" height="14" rx="3" fill="#f8fafc" stroke="#059669" stroke-width="1"/><text x="150" y="540" class="tiny" text-anchor="middle" fill="#059669">NEW</text><rect x="420" y="150" width="140" height="50" rx="6" fill="#e0f2fe" stroke="#0891b2" stroke-width="1.2"/><text x="490" y="172" class="small" text-anchor="middle" fill="#0891b2">useCharacterStore</text><text x="490" y="188" class="tiny" text-anchor="middle" fill="#475569">stores/character.ts</text><rect x="522" y="140" width="36" height="14" rx="3" fill="#f8fafc" stroke="#0891b2" stroke-width="1"/><text x="540" y="150" class="tiny" text-anchor="middle" fill="#0891b2">KEEP</text><rect x="420" y="215" width="140" height="50" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.2"/><text x="490" y="237" class="small" text-anchor="middle" fill="#d97706">useCharacterRelStore</text><text x="490" y="253" class="tiny" text-anchor="middle" fill="#475569">+upsert + dedup</text><rect x="522" y="205" width="36" height="14" rx="3" fill="#f8fafc" stroke="#d97706" stroke-width="1"/><text x="540" y="215" class="tiny" text-anchor="middle" fill="#d97706">MOD</text><rect x="420" y="280" width="140" height="50" rx="6" fill="#e0f2fe" stroke="#0891b2" stroke-width="1.2"/><text x="490" y="302" class="small" text-anchor="middle" fill="#0891b2">usePromptStore</text><text x="490" y="318" class="tiny" text-anchor="middle" fill="#475569">+extend 注册</text><rect x="522" y="270" width="36" height="14" rx="3" fill="#f8fafc" stroke="#0891b2" stroke-width="1"/><text x="540" y="280" class="tiny" text-anchor="middle" fill="#0891b2">KEEP</text><rect x="420" y="345" width="140" height="50" rx="6" fill="#e0f2fe" stroke="#0891b2" stroke-width="1.2"/><text x="490" y="367" class="small" text-anchor="middle" fill="#0891b2">useAIStore</text><text x="490" y="383" class="tiny" text-anchor="middle" fill="#475569">stores/ai-config.ts</text><rect x="522" y="335" width="36" height="14" rx="3" fill="#f8fafc" stroke="#0891b2" stroke-width="1"/><text x="540" y="345" class="tiny" text-anchor="middle" fill="#0891b2">KEEP</text><rect x="420" y="410" width="140" height="50" rx="6" fill="#dcfce7" stroke="#059669" stroke-width="1.2"/><text x="490" y="432" class="small" text-anchor="middle" fill="#059669">useInspirationHistory</text><text x="490" y="448" class="tiny" text-anchor="middle" fill="#475569">+stores/inspiration-history.ts</text><rect x="522" y="400" width="36" height="14" rx="3" fill="#f8fafc" stroke="#059669" stroke-width="1"/><text x="540" y="410" class="tiny" text-anchor="middle" fill="#059669">NEW</text><rect x="420" y="475" width="140" height="50" rx="6" fill="#dcfce7" stroke="#059669" stroke-width="1.2"/><text x="490" y="497" class="small" text-anchor="middle" fill="#059669">useRelationDedup</text><text x="490" y="513" class="tiny" text-anchor="middle" fill="#475569">+utils/dedup-relations.ts</text><rect x="522" y="465" width="36" height="14" rx="3" fill="#f8fafc" stroke="#059669" stroke-width="1"/><text x="540" y="475" class="tiny" text-anchor="middle" fill="#059669">NEW</text><rect x="420" y="540" width="140" height="50" rx="6" fill="#e0f2fe" stroke="#0891b2" stroke-width="1.2"/><text x="490" y="562" class="small" text-anchor="middle" fill="#0891b2">useProjectStore...</text><text x="490" y="578" class="tiny" text-anchor="middle" fill="#475569">stores/project.ts</text><rect x="522" y="530" width="36" height="14" rx="3" fill="#f8fafc" stroke="#0891b2" stroke-width="1"/><text x="540" y="540" class="tiny" text-anchor="middle" fill="#0891b2">KEEP</text><rect x="800" y="150" width="150" height="40" rx="6" fill="#e0f2fe" stroke="#0891b2" stroke-width="1.2"/><text x="875" y="166" class="small" text-anchor="middle" fill="#0891b2">characters</text><text x="875" y="182" class="tiny" text-anchor="middle" fill="#475569">角色库</text><rect x="912" y="140" width="36" height="14" rx="3" fill="#f8fafc" stroke="#0891b2" stroke-width="1"/><text x="930" y="150" class="tiny" text-anchor="middle" fill="#0891b2">KEEP</text><rect x="800" y="200" width="150" height="40" rx="6" fill="#fee2e2" stroke="#e11d48" stroke-width="1.2"/><text x="875" y="216" class="small" text-anchor="middle" fill="#e11d48">characterRelations</text><text x="875" y="232" class="tiny" text-anchor="middle" fill="#475569">✓ upsert 去重</text><rect x="912" y="190" width="36" height="14" rx="3" fill="#f8fafc" stroke="#e11d48" stroke-width="1"/><text x="930" y="200" class="tiny" text-anchor="middle" fill="#e11d48">FIX</text><rect x="800" y="250" width="150" height="40" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.2"/><text x="875" y="266" class="small" text-anchor="middle" fill="#d97706">promptTemplates</text><text x="875" y="282" class="tiny" text-anchor="middle" fill="#475569">+inspiration.reverse.extend</text><rect x="912" y="240" width="36" height="14" rx="3" fill="#f8fafc" stroke="#d97706" stroke-width="1"/><text x="930" y="250" class="tiny" text-anchor="middle" fill="#d97706">MOD</text><rect x="800" y="300" width="150" height="40" rx="6" fill="#e0f2fe" stroke="#0891b2" stroke-width="1.2"/><text x="875" y="316" class="small" text-anchor="middle" fill="#0891b2">detailedOutlines</text><text x="875" y="332" class="tiny" text-anchor="middle" fill="#475569">细纲</text><rect x="912" y="290" width="36" height="14" rx="3" fill="#f8fafc" stroke="#0891b2" stroke-width="1"/><text x="930" y="300" class="tiny" text-anchor="middle" fill="#0891b2">KEEP</text><rect x="800" y="350" width="150" height="40" rx="6" fill="#e0f2fe" stroke="#0891b2" stroke-width="1.2"/><text x="875" y="366" class="small" text-anchor="middle" fill="#0891b2">chapters</text><text x="875" y="382" class="tiny" text-anchor="middle" fill="#475569">章节</text><rect x="912" y="340" width="36" height="14" rx="3" fill="#f8fafc" stroke="#0891b2" stroke-width="1"/><text x="930" y="350" class="tiny" text-anchor="middle" fill="#0891b2">KEEP</text><rect x="800" y="400" width="150" height="40" rx="6" fill="#dcfce7" stroke="#059669" stroke-width="1.2"/><text x="875" y="416" class="small" text-anchor="middle" fill="#059669">inspirationHistory</text><text x="875" y="432" class="tiny" text-anchor="middle" fill="#475569">+localStorage / 5MB</text><rect x="912" y="390" width="36" height="14" rx="3" fill="#f8fafc" stroke="#059669" stroke-width="1"/><text x="930" y="400" class="tiny" text-anchor="middle" fill="#059669">NEW</text><rect x="800" y="450" width="150" height="40" rx="6" fill="#e0f2fe" stroke="#0891b2" stroke-width="1.2"/><text x="875" y="466" class="small" text-anchor="middle" fill="#0891b2">worldview...</text><text x="875" y="482" class="tiny" text-anchor="middle" fill="#475569">27 张表不动</text><rect x="912" y="440" width="36" height="14" rx="3" fill="#f8fafc" stroke="#0891b2" stroke-width="1"/><text x="930" y="450" class="tiny" text-anchor="middle" fill="#0891b2">KEEP</text><rect x="1000" y="150" width="220" height="80" rx="8" fill="#e0f2fe" stroke="#d97706" stroke-width="1.2"/><text x="1110" y="172" class="h3" text-anchor="middle" fill="#d97706">lib/ai/adapters/*</text><text x="1110" y="192" class="small" text-anchor="middle" fill="#475569">OpenAI / Anthropic</text><text x="1110" y="208" class="small" text-anchor="middle" fill="#475569">Ollama / 自定义 API</text><text x="1110" y="222" class="tiny" text-anchor="middle" fill="#d97706">直连浏览器（不变）</text><rect x="1230" y="150" width="130" height="80" rx="8" fill="#fef3c7" stroke="#0891b2" stroke-width="1.2"/><text x="1295" y="172" class="h3" text-anchor="middle" fill="#0891b2">lib/registry/</text><text x="1295" y="188" class="small" text-anchor="middle" fill="#475569">context-sources</text><text x="1295" y="202" class="small" text-anchor="middle" fill="#059669">+ existing_rel</text><text x="1295" y="216" class="small" text-anchor="middle" fill="#059669">+ existing_char</text><text x="1295" y="230" class="small" text-anchor="middle" fill="#475569">field-registry</text><rect x="1324" y="140" width="34" height="14" rx="3" fill="#f8fafc" stroke="#d97706" stroke-width="1"/><text x="1342" y="150" class="tiny" text-anchor="middle" fill="#d97706">MOD</text><rect x="1230" y="250" width="130" height="60" rx="8" fill="#dcfce7" stroke="#059669" stroke-width="1.2"/><text x="1295" y="272" class="h3" text-anchor="middle" fill="#059669">extendPrompt</text><text x="1295" y="288" class="small" text-anchor="middle" fill="#475569">inspiration.reverse.extend</text><text x="1295" y="302" class="small" text-anchor="middle" fill="#475569">模板（新注册）</text><rect x="1324" y="240" width="34" height="14" rx="3" fill="#f8fafc" stroke="#059669" stroke-width="1"/><text x="1342" y="250" class="tiny" text-anchor="middle" fill="#059669">NEW</text><text x="20" y="620" class="h2" text-anchor="start" fill="#0891b2">▍链路 1 · 启动加载（基本不变）</text><rect x="20" y="635" width="1360" height="50" rx="6" fill="#e0f2fe" stroke="#0891b2" stroke-width="1"/><text x="34" y="658" class="small" text-anchor="start">  WorkspacePage.onMount → useCharacterStore.loadAll() → useInspirationHistory.init() → useCharacterRelStore.loadAll()</text><text x="34" y="678" class="path" text-anchor="start" fill="#059669">  ✓ 无破坏改动 · 新增 useInspirationHistory.init() 从 localStorage 恢复快照</text><text x="20" y="705" class="h2" text-anchor="start" fill="#d97706">▍链路 2 · 灵感反推（重塑：+历史快照 +扩展 +State Injection）</text><rect x="20" y="720" width="1360" height="120" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.2"/><text x="34" y="742" class="small" text-anchor="start" fill="#475569">① InspirationPage 点"灵感反推"</text><text x="34" y="754" class="small" text-anchor="start" fill="#059669">  → useInspirationHistory.snapshot({roles, relations, ts:"v1"})  ← NEW history[]</text><text x="34" y="766" class="small" text-anchor="start" fill="#d97706">  → buildInspirationReversePrompt() + State Injection（existing_context 从 IndexedDB 注入） ← MOD</text><text x="34" y="778" class="small" text-anchor="start" fill="#475569">  → LLM API</text><text x="34" y="790" class="small" text-anchor="start" fill="#475569">  → parseReverseOutput</text><text x="34" y="802" class="small" text-anchor="start" fill="#059669">② 用户点 ◀上一版 / ▶下一版 → useInspirationHistory.goto(idx)  ← NEW</text><text x="34" y="814" class="small" text-anchor="start" fill="#059669">③ 灵感反推结果已采纳后，用户点"扩展 N 个次要角色" → inspiration.reverse.extend + 重新注入 existing_context  ← NEW</text><text x="34" y="826" class="small" text-anchor="start" fill="#475569">  → LLM → parseExtendOutput → merge 进 store</text><text x="34" y="838" class="small" text-anchor="start" fill="#e11d48">✓ 采纳时：handleAcceptExtracted 加 &amp;&amp; !isDuplicate 守卫 → addRelation 自动 upsert  ← FIX</text><text x="20" y="855" class="h2" text-anchor="start" fill="#d97706">▍链路 3 · 关系图渲染（重塑：+入口 dedup +isDirectedType 映射）</text><rect x="20" y="870" width="1360" height="80" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.2"/><text x="34" y="892" class="small" text-anchor="start" fill="#475569">RelationGraph 订阅 useCharacterRelStore.relations</text><text x="34" y="904" class="small" text-anchor="start" fill="#059669">→ useRelationDedup.dedup(relations) 按 (from, to, type) 归并 ← NEW</text><text x="34" y="916" class="small" text-anchor="start" fill="#d97706">→ relations.map(r =&gt; GraphLink) + isDirectedType(type) 映射表 ← MOD</text><text x="34" y="928" class="small" text-anchor="start" fill="#475569">→ processLinks(links) curvature 排版（已有）</text><text x="34" y="940" class="small" text-anchor="start" fill="#475569">→ ForceGraph2D 渲染 → 视觉上 dedup 后无重复 + 箭头方向按类型</text><text x="34" y="952" class="small" text-anchor="start" fill="#e11d48">✓ 53 条 → ≤ 30 条 + 有向/无向分线</text><text x="20" y="960" class="h2" text-anchor="start" fill="#d97706">▍链路 4 · AI Prompt Context 装配（重塑：+ existing_context source）</text><rect x="20" y="975" width="1360" height="60" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1"/><text x="34" y="998" class="small" text-anchor="start" fill="#475569">CONTEXT_SOURCES 现在包含 2 个新 source：existing_relations + existing_characters</text><text x="34" y="1010" class="small" text-anchor="start" fill="#475569">→ source.read(input) 拉 IndexedDB 当前数据 → capBySourceBudget (按总 token 比例)</text><text x="34" y="1022" class="small" text-anchor="start" fill="#475569">→ renderPrompt(tpl, {..., existing_context}) 注入到 LLM 消息头部</text><text x="34" y="1034" class="small" text-anchor="start" fill="#059669">✓ LLM 现在知道"已采纳什么"，新增/扩展重复率从 40% 降到 &lt;5%</text><rect x="20" y="1050" width="1360" height="40" rx="6" fill="#f8fafc" stroke="#0891b2" stroke-width="1"/><text x="40" y="1073" class="h3" text-anchor="start" fill="#0891b2">📊 改动统计：</text><text x="180" y="1073" class="small" text-anchor="start" fill="#059669">NEW 3 项</text><text x="310" y="1073" class="small" text-anchor="start" fill="#d97706">·  MOD 4 项</text><text x="420" y="1073" class="small" text-anchor="start" fill="#e11d48">·  FIX 1 项</text><text x="530" y="1073" class="small" text-anchor="start" fill="#0891b2">·  KEEP 6 项（无破坏）</text><text x="770" y="1073" class="small" text-anchor="start" fill="#7c3aed">·  合计 5.5 人天（P0=1.5 + P1=4.0）</text><text x="1160" y="1073" class="small" text-anchor="start" fill="#475569">·  不动 store 订阅者接口</text></svg>