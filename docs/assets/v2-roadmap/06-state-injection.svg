<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 640" width="1100" height="640"><style>
    text { font-family: 'SF Mono', 'Cascadia Code', 'Consolas', 'Menlo', 'Monaco', 'Courier New', monospace; fill: #334155; }
  .bg { fill: #ffffff; }
  .title { font-size: 18px; font-weight: 700; fill: #0f172a; }
  .subtitle { font-size: 11px; font-weight: 400; fill: #475569; }
  .h2 { font-size: 12px; font-weight: 600; fill: #1e293b; }
  .h3 { font-size: 10px; font-weight: 600; fill: #1e293b; }
  .label { font-size: 10px; font-weight: 500; fill: #1e293b; }
  .small { font-size: 9px; font-weight: 400; fill: #475569; }
  .tiny { font-size: 8px; font-weight: 400; fill: #64748b; }
</style><rect class="bg" width="1100" height="640"/><text x="20" y="28" class="title" text-anchor="start" fill="#0f172a">#06 Prompt 状态注入：existing_context + 增量生成</text><text x="20" y="44" class="subtitle" text-anchor="start">灵感反推二次调用：先注入已有关系，再让 LLM 增量</text><line x1="20" y1="52" x2="1080" y2="52" stroke="#334155" stroke-width="1"/><text x="20" y="90" class="h3" text-anchor="start" fill="#fb7185">❌ 当前 Prompt（一次性全量）</text><rect x="20" y="100" width="510" height="200" rx="8" fill="rgba(251,113,133,0.10)" stroke="#fb7185" stroke-width="1.2"/><text x="34" y="122" class="small" text-anchor="start" fill="#475569">system: "你是一个小说创作助手"</text><text x="34" y="137" class="small" text-anchor="start" fill="#475569">user: "请基于以下灵感生成 3 个角色 + 关系"</text><text x="34" y="152" class="small" text-anchor="start" fill="#475569"></text><text x="34" y="167" class="small" text-anchor="start" fill="#475569">灵感：{free text from user}</text><text x="34" y="182" class="small" text-anchor="start" fill="#475569"></text><text x="34" y="197" class="small" text-anchor="start" fill="#475569">要求：</text><text x="34" y="212" class="small" text-anchor="start" fill="#475569">- 角色：林知夏、顾承曜、陆温言</text><text x="34" y="227" class="small" text-anchor="start" fill="#475569">- 关系：自由发挥</text><text x="34" y="242" class="small" text-anchor="start" fill="#475569"></text><text x="34" y="257" class="small" text-anchor="start" fill="#fb7185">⚠ 没有显式 existing_context</text><text x="34" y="272" class="small" text-anchor="start" fill="#fb7185">⚠ LLM 不知道已经采纳过哪些</text><text x="34" y="287" class="small" text-anchor="start" fill="#fb7185">⚠ 容易产生重复条目（id 不同但 pair+type 同）</text><text x="560" y="90" class="h3" text-anchor="start" fill="#34d399">✅ 新 Prompt（带 existing_context）</text><rect x="560" y="100" width="520" height="200" rx="8" fill="rgba(52,211,153,0.10)" stroke="#34d399" stroke-width="1.2"/><text x="574" y="122" class="small" text-anchor="start" fill="#475569">system: "你是一个小说创作助手"</text><text x="574" y="137" class="small" text-anchor="start" fill="#475569">user: "请在已有关系基础上增量生成新的关系"</text><text x="574" y="152" class="small" text-anchor="start" fill="#475569"></text><text x="574" y="167" class="small" text-anchor="start" fill="#475569">existing_context: {</text><text x="574" y="182" class="small" text-anchor="start" fill="#475569">  roles: [{id:1, name:"林知夏"}, {id:2, name:"顾承曜"}],</text><text x="574" y="197" class="small" text-anchor="start" fill="#475569">  relations: [</text><text x="574" y="212" class="small" text-anchor="start" fill="#475569">    {from:1, to:2, type:"ally"},</text><text x="574" y="227" class="small" text-anchor="start" fill="#475569">    {from:1, to:3, type:"ally"}</text><text x="574" y="242" class="small" text-anchor="start" fill="#475569">  ]</text><text x="574" y="257" class="small" text-anchor="start" fill="#475569">}</text><text x="574" y="272" class="small" text-anchor="start" fill="#475569"></text><text x="574" y="287" class="small" text-anchor="start" fill="#475569">要求：</text><text x="574" y="302" class="small" text-anchor="start" fill="#475569">- 只输出 NOT IN existing_context 的新关系</text><text x="574" y="317" class="small" text-anchor="start" fill="#475569">- output: {new_roles, new_relations, summary_diff}</text><text x="20" y="330" class="h2" text-anchor="start" fill="#22d3ee">▍流程：用户点「灵感反推」 → 数据采集 → Prompt 组装 → LLM 调用 → 结果合并</text><rect x="30" y="360" width="130" height="60" rx="8" fill="rgba(241,245,249,0.7)" stroke="#22d3ee" stroke-width="1.5"/><text x="95" y="384" class="small" text-anchor="middle" fill="#22d3ee">1. 触发</text><text x="95" y="400" class="small" text-anchor="middle" fill="#22d3ee">灵感反推</text><rect x="180" y="360" width="150" height="60" rx="8" fill="rgba(241,245,249,0.7)" stroke="#a78bfa" stroke-width="1.5"/><text x="255" y="384" class="small" text-anchor="middle" fill="#a78bfa">2. 查询 IndexedDB</text><text x="255" y="400" class="small" text-anchor="middle" fill="#a78bfa">当前角色+关系</text><rect x="350" y="360" width="150" height="60" rx="8" fill="rgba(241,245,249,0.7)" stroke="#fbbf24" stroke-width="1.5"/><text x="425" y="384" class="small" text-anchor="middle" fill="#fbbf24">3. 构造</text><text x="425" y="400" class="small" text-anchor="middle" fill="#fbbf24">existing_context</text><rect x="520" y="360" width="130" height="60" rx="8" fill="rgba(241,245,249,0.7)" stroke="#34d399" stroke-width="1.5"/><text x="585" y="384" class="small" text-anchor="middle" fill="#34d399">4. 注入到</text><text x="585" y="400" class="small" text-anchor="middle" fill="#34d399">Prompt 头部</text><rect x="670" y="360" width="130" height="60" rx="8" fill="rgba(241,245,249,0.7)" stroke="#22d3ee" stroke-width="1.5"/><text x="735" y="384" class="small" text-anchor="middle" fill="#22d3ee">5. 调用 LLM</text><text x="735" y="400" class="small" text-anchor="middle" fill="#22d3ee">拿 new_relations</text><rect x="820" y="360" width="130" height="60" rx="8" fill="rgba(241,245,249,0.7)" stroke="#a78bfa" stroke-width="1.5"/><text x="885" y="384" class="small" text-anchor="middle" fill="#a78bfa">6. 在前端</text><text x="885" y="400" class="small" text-anchor="middle" fill="#a78bfa">dedup + diff</text><rect x="970" y="360" width="110" height="60" rx="8" fill="rgba(241,245,249,0.7)" stroke="#34d399" stroke-width="1.5"/><text x="1025" y="384" class="small" text-anchor="middle" fill="#34d399">7. 用户</text><text x="1025" y="400" class="small" text-anchor="middle" fill="#34d399">确认采纳</text><line x1="160" y1="390" x2="174" y2="390" stroke="#475569" stroke-width="1.5"/><polygon points="180,390 174,394 174,386" fill="#475569"/><line x1="330" y1="390" x2="344" y2="390" stroke="#475569" stroke-width="1.5"/><polygon points="350,390 344,394 344,386" fill="#475569"/><line x1="500" y1="390" x2="514" y2="390" stroke="#475569" stroke-width="1.5"/><polygon points="520,390 514,394 514,386" fill="#475569"/><line x1="650" y1="390" x2="664" y2="390" stroke="#475569" stroke-width="1.5"/><polygon points="670,390 664,394 664,386" fill="#475569"/><line x1="800" y1="390" x2="814" y2="390" stroke="#475569" stroke-width="1.5"/><polygon points="820,390 814,394 814,386" fill="#475569"/><line x1="950" y1="390" x2="964" y2="390" stroke="#475569" stroke-width="1.5"/><polygon points="970,390 964,394 964,386" fill="#475569"/><line x1="80" y1="440" x2="80" y2="510" stroke="#fb7185" stroke-width="1" stroke-dasharray="4,4"/><rect x="20" y="510" width="200" height="70" rx="6" fill="rgba(251,113,133,0.10)" stroke="#fb7185" stroke-width="1"/><text x="30" y="532" class="small" text-anchor="start" fill="#fb7185">异常：LLM 仍返回
已存在的关系</text><text x="30" y="552" class="small" text-anchor="start" fill="#fb7185">→ 前端 dedup 兜底</text><text x="30" y="568" class="small" text-anchor="start" fill="#fb7185">→ 不入库</text><rect x="250" y="480" width="820" height="140" rx="8" fill="rgba(34,211,238,0.10)" stroke="#22d3ee" stroke-width="1.2"/><text x="270" y="502" class="h3" text-anchor="start" fill="#22d3ee">🎯 预期效果（基于 Gemini 第一轮回复）</text><text x="270" y="520" class="small" text-anchor="start">• LLM 重复率从 ~40% 降到 &lt;5%（Prompt 显式约束）</text><text x="270" y="536" class="small" text-anchor="start">• Token 成本 ↓ 30%（existing_context 是结构化 JSON，比让 LLM 自己回忆便宜）</text><text x="270" y="552" class="small" text-anchor="start">• 用户体验：dedup + diff 直接展示「新增 3 条 / 已存在 0 条 / 重复 0 条」</text><text x="270" y="568" class="small" text-anchor="start">• 不破坏现有：只在 inspirationExtendPrompt 模板加 {{existing_context}} 占位符</text><text x="270" y="584" class="small" text-anchor="start" fill="#fbbf24">• 风险：existing_context 超过 8k token 时要分页 / 摘要压缩</text><text x="270" y="600" class="small" text-anchor="start" fill="#a78bfa">🧠 Gemini 评估：这是「3 个 yes/no」里最容易落地、ROI 最高的一项</text></svg>