</style><rect class="bg" width="1400" height="980"/><text x="20" y="28" class="title" text-anchor="start">#A 现状架构 · 5 条核心链路</text><text x="20" y="44" class="subtitle" text-anchor="start">StoryForge 纯前端 React + IndexedDB + 直连 LLM · 痛点红框标注</text><line x1="20" y1="52" x2="1380" y2="52" stroke="#cbd5e1" stroke-width="1"/><text x="40" y="80" class="h2" text-anchor="start" fill="#7c3aed">① UI 层（React 组件）</text><line x1="40" y1="88" x2="360" y2="88" stroke="#7c3aed" stroke-width="1" stroke-dasharray="2,3"/><text x="420" y="80" class="h2" text-anchor="start" fill="#0891b2">② Store 层（Zustand）</text><line x1="420" y1="88" x2="740" y2="88" stroke="#0891b2" stroke-width="1" stroke-dasharray="2,3"/><text x="800" y="80" class="h2" text-anchor="start" fill="#059669">③ 持久层（IndexedDB / Dexie）</text><line x1="800" y1="88" x2="1180" y2="88" stroke="#059669" stroke-width="1" stroke-dasharray="2,3"/><text x="1220" y="80" class="h2" text-anchor="start" fill="#d97706">④ LLM + Prompt</text><line x1="1220" y1="88" x2="1380" y2="88" stroke="#d97706" stroke-width="1" stroke-dasharray="2,3"/><rect x="40" y="110" width="130" height="50" rx="6" fill="#f8fafc" stroke="#7c3aed" stroke-width="1.2"/><text x="105" y="132" class="small" text-anchor="middle" fill="#7c3aed">WorkspacePage</text><text x="105" y="148" class="tiny" text-anchor="middle" fill="#475569">components/</text><rect x="40" y="175" width="130" height="50" rx="6" fill="#f8fafc" stroke="#7c3aed" stroke-width="1.2"/><text x="105" y="197" class="small" text-anchor="middle" fill="#7c3aed">CharacterPanel</text><text x="105" y="213" class="tiny" text-anchor="middle" fill="#475569">components/</text><rect x="40" y="240" width="130" height="50" rx="6" fill="#f8fafc" stroke="#7c3aed" stroke-width="1.2"/><text x="105" y="262" class="small" text-anchor="middle" fill="#7c3aed">CharacterRelationPanel</text><text x="105" y="278" class="tiny" text-anchor="middle" fill="#475569">components/</text><rect x="40" y="305" width="130" height="50" rx="6" fill="#f8fafc" stroke="#7c3aed" stroke-width="1.2"/><text x="105" y="327" class="small" text-anchor="middle" fill="#7c3aed">RelationGraph</text><text x="105" y="343" class="tiny" text-anchor="middle" fill="#475569">components/</text><rect x="40" y="370" width="130" height="50" rx="6" fill="#f8fafc" stroke="#7c3aed" stroke-width="1.2"/><text x="105" y="392" class="small" text-anchor="middle" fill="#7c3aed">AIConfigPanel</text><text x="105" y="408" class="tiny" text-anchor="middle" fill="#475569">components/</text><rect x="40" y="435" width="130" height="50" rx="6" fill="#f8fafc" stroke="#7c3aed" stroke-width="1.2"/><text x="105" y="457" class="small" text-anchor="middle" fill="#7c3aed">InspirationPage</text><text x="105" y="473" class="tiny" text-anchor="middle" fill="#475569">components/</text><rect x="420" y="110" width="140" height="50" rx="6" fill="#f8fafc" stroke="#0891b2" stroke-width="1.2"/><text x="490" y="132" class="small" text-anchor="middle" fill="#0891b2">useCharacterStore</text><text x="490" y="148" class="tiny" text-anchor="middle" fill="#475569">stores/character.ts</text><rect x="420" y="175" width="140" height="50" rx="6" fill="#f8fafc" stroke="#0891b2" stroke-width="1.2"/><text x="490" y="197" class="small" text-anchor="middle" fill="#0891b2">useCharacterRelStore</text><text x="490" y="213" class="tiny" text-anchor="middle" fill="#475569">stores/character-relation.ts</text><rect x="420" y="240" width="140" height="50" rx="6" fill="#f8fafc" stroke="#0891b2" stroke-width="1.2"/><text x="490" y="262" class="small" text-anchor="middle" fill="#0891b2">usePromptStore</text><text x="490" y="278" class="tiny" text-anchor="middle" fill="#475569">stores/prompt.ts</text><rect x="420" y="305" width="140" height="50" rx="6" fill="#f8fafc" stroke="#0891b2" stroke-width="1.2"/><text x="490" y="327" class="small" text-anchor="middle" fill="#0891b2">useAIStore</text><text x="490" y="343" class="tiny" text-anchor="middle" fill="#475569">stores/ai-config.ts</text><rect x="420" y="370" width="140" height="50" rx="6" fill="#f8fafc" stroke="#0891b2" stroke-width="1.2"/><text x="490" y="392" class="small" text-anchor="middle" fill="#0891b2">useProjectStore</text><text x="490" y="408" class="tiny" text-anchor="middle" fill="#475569">stores/project.ts</text><rect x="420" y="435" width="140" height="50" rx="6" fill="#f8fafc" stroke="#0891b2" stroke-width="1.2"/><text x="490" y="457" class="small" text-anchor="middle" fill="#0891b2">useOutlineStore...</text><text x="490" y="473" class="tiny" text-anchor="middle" fill="#475569">stores/* (29 个)</text><rect x="800" y="110" width="150" height="40" rx="6" fill="#f8fafc" stroke="#059669" stroke-width="1.2"/><text x="875" y="126" class="small" text-anchor="middle" fill="#059669">characters</text><text x="875" y="142" class="tiny" text-anchor="middle" fill="#475569">角色库</text><rect x="800" y="160" width="150" height="40" rx="6" fill="#fee2e2" stroke="#e11d48" stroke-width="1.2"/><text x="875" y="176" class="small" text-anchor="middle" fill="#e11d48">characterRelations ⚠</text><text x="875" y="192" class="tiny" text-anchor="middle" fill="#475569">关系表（钢丝球）</text><rect x="800" y="210" width="150" height="40" rx="6" fill="#f8fafc" stroke="#059669" stroke-width="1.2"/><text x="875" y="226" class="small" text-anchor="middle" fill="#059669">promptTemplates</text><text x="875" y="242" class="tiny" text-anchor="middle" fill="#475569">35+ 内置模板</text><rect x="800" y="260" width="150" height="40" rx="6" fill="#f8fafc" stroke="#059669" stroke-width="1.2"/><text x="875" y="276" class="small" text-anchor="middle" fill="#059669">detailedOutlines</text><text x="875" y="292" class="tiny" text-anchor="middle" fill="#475569">细纲</text><rect x="800" y="310" width="150" height="40" rx="6" fill="#f8fafc" stroke="#059669" stroke-width="1.2"/><text x="875" y="326" class="small" text-anchor="middle" fill="#059669">chapters</text><text x="875" y="342" class="tiny" text-anchor="middle" fill="#475569">章节</text><rect x="800" y="360" width="150" height="40" rx="6" fill="#f8fafc" stroke="#059669" stroke-width="1.2"/><text x="875" y="376" class="small" text-anchor="middle" fill="#059669">worldview...</text><text x="875" y="392" class="tiny" text-anchor="middle" fill="#475569">世界观等 27 张</text><rect x="1000" y="110" width="220" height="80" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.2"/><text x="1110" y="132" class="h3" text-anchor="middle" fill="#d97706">lib/ai/adapters/*</text><text x="1110" y="152" class="small" text-anchor="middle" fill="#475569">OpenAI / Anthropic</text><text x="1110" y="168" class="small" text-anchor="middle" fill="#475569">Ollama / 自定义 API</text><text x="1110" y="182" class="tiny" text-anchor="middle" fill="#d97706">直连浏览器 → 用户 API Key</text><rect x="1230" y="110" width="130" height="80" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="1.2"/><text x="1295" y="132" class="h3" text-anchor="middle" fill="#0891b2">lib/registry/</text><text x="1295" y="152" class="small" text-anchor="middle" fill="#475569">context-sources</text><text x="1295" y="168" class="small" text-anchor="middle" fill="#475569">field-registry</text><text x="1295" y="182" class="small" text-anchor="middle" fill="#475569">project-tables</text><text x="20" y="550" class="h2" text-anchor="start" fill="#0891b2">▍链路 1 · 启动加载（UI → Store → IndexedDB）</text><rect x="20" y="565" width="1360" height="70" rx="6" fill="#ecfeff" stroke="#0891b2" stroke-width="1"/><text x="34" y="588" class="small" text-anchor="start" fill="#0891b2">  WorkspacePage.onMount</text><text x="280" y="588" class="label" text-anchor="middle" fill="#475569">→</text><text x="310" y="588" class="small" text-anchor="start" fill="#0891b2">useCharacterStore.loadAll(projectId)</text><text x="680" y="588" class="label" text-anchor="middle" fill="#475569">→</text><text x="710" y="588" class="small" text-anchor="start" fill="#059669">db.characters.where("projectId").equals(id).toArray()</text><text x="34" y="608" class="small" text-anchor="start" fill="#475569">  useCharacterRelStore.loadAll 同上 → setState 触发所有订阅组件</text><text x="34" y="625" class="path" text-anchor="start">  ✓ 健康路径：无 dedup / 无 upsert / 直接 toArray 全量加载</text><text x="20" y="655" class="h2" text-anchor="start" fill="#e11d48">▍链路 2 · 灵感反推 / AI 设计（最痛）</text><rect x="20" y="670" width="1360" height="130" rx="6" fill="#fef2f2" stroke="#e11d48" stroke-width="1.2"/><text x="34" y="692" class="small" text-anchor="start" fill="#475569">InspirationPage 点"灵感反推"</text><text x="34" y="706" class="small" text-anchor="start" fill="#475569">→ buildInspirationReversePrompt()</text><text x="34" y="720" class="small" text-anchor="start" fill="#475569">→ usePromptStore.getActive("inspiration.reverse") 拉模板</text><text x="34" y="734" class="small" text-anchor="start" fill="#475569">→ renderPrompt(tpl, {projectName, genres, inspiration})</text><text x="34" y="748" class="small" text-anchor="start" fill="#475569">→ LLM API（直连）</text><text x="34" y="762" class="small" text-anchor="start" fill="#e11d48">→ parseReverseOutput(JSON 抽取)</text><text x="34" y="776" class="small" text-anchor="start" fill="#e11d48">→ ⚠ handleAcceptExtracted()：遍历 selectedExtracted，**只判断是否勾选，不判断 isDuplicate**</text><text x="34" y="790" class="small" text-anchor="start" fill="#e11d48">→ addRelation({...}) 直接入库 → characterRelations 表</text><text x="20" y="815" class="h2" text-anchor="start" fill="#e11d48">▍链路 3 · 关系图渲染（视觉钢丝球）</text><rect x="20" y="830" width="1360" height="70" rx="6" fill="#fef2f2" stroke="#e11d48" stroke-width="1.2"/><text x="34" y="853" class="small" text-anchor="start" fill="#475569">RelationGraph 订阅 useCharacterRelStore.relations</text><text x="34" y="867" class="small" text-anchor="start" fill="#475569">→ relations.map(r => GraphLink{source, target, bidirectional, label, color})</text><text x="34" y="881" class="small" text-anchor="start" fill="#e11d48">→ processLinks(links)  ⚠ 仅做 curvature 排版（同 pair 多条会被 fan-out），**不去重**</text><text x="34" y="895" class="small" text-anchor="start" fill="#e11d48">→ ForceGraph2D 渲染 → 视觉上 N 条同 pair 线叠在一起</text><text x="20" y="915" class="h2" text-anchor="start" fill="#d97706">▍链路 4 · AI Prompt Context 装配（assembleContext）</text><rect x="20" y="928" width="1360" height="50" rx="6" fill="#f8fafc" stroke="#d97706" stroke-width="1"/><text x="34" y="950" class="small" text-anchor="start">  CONTEXT_SOURCES (registered) → source.read(input) → capBySourceBudget → trimToFit(inputBudget)</text><text x="34" y="968" class="path" text-anchor="start" fill="#e11d48">  ⚠ 当前 context-sources 注册表里没有 "existing_relations" / "existing_characters" source → LLM 看不到已有数据</text><rect x="20" y="985" width="1360" height="0" rx="6" fill="#e11d48" stroke="#e11d48" stroke-width="0"/></svg>