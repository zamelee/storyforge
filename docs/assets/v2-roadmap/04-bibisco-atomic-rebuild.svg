<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 640" width="1100" height="640"><style>
    text { font-family: 'SF Mono', 'Cascadia Code', 'Consolas', 'Menlo', 'Monaco', 'Courier New', monospace; fill: #334155; }
  .bg { fill: #ffffff; }
  .title { font-size: 18px; font-weight: 700; fill: #0f172a; }
  .subtitle { font-size: 11px; font-weight: 400; fill: #475569; }
  .h2 { font-size: 12px; font-weight: 600; fill: #1e293b; }
  .h3 { font-size: 10px; font-weight: 600; fill: #1e293b; }
  .label { font-size: 10px; font-weight: 500; fill: #1e293b; }
  .small { font-size: 9px; font-weight: 400; fill: #475569; }
  .tiny { font-size: 8px; font-weight: 400; fill: #64748b; }
</style><rect class="bg" width="1100" height="640"/><text x="20" y="28" class="title" text-anchor="start" fill="#0f172a">#04 bibisco 模式：RelationsService 原子重建时序</text><text x="20" y="44" class="subtitle" text-anchor="start">addRelation upsert + in-memory dedup + saveDatabase (relations-service.js)</text><line x1="20" y1="52" x2="1080" y2="52" stroke="#334155" stroke-width="1"/><rect x="10" y="70" width="100" height="50" rx="6" fill="rgba(241,245,249,0.7)" stroke="#475569" stroke-width="1.2"/><text x="60" y="90" class="h3" text-anchor="middle" fill="#475569">User</text><line x1="60" y1="130" x2="60" y2="600" stroke="#475569" stroke-width="1" stroke-dasharray="4,4"/><rect x="150" y="70" width="100" height="50" rx="6" fill="rgba(241,245,249,0.7)" stroke="#22d3ee" stroke-width="1.2"/><text x="200" y="90" class="h3" text-anchor="middle" fill="#22d3ee">UI / 表单</text><line x1="200" y1="130" x2="200" y2="600" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4,4"/><rect x="310" y="70" width="100" height="50" rx="6" fill="rgba(241,245,249,0.7)" stroke="#a78bfa" stroke-width="1.2"/><text x="360" y="90" class="h3" text-anchor="middle" fill="#a78bfa">Store</text><text x="360" y="104" class="h3" text-anchor="middle" fill="#a78bfa">(useCharacterStore)</text><line x1="360" y1="130" x2="360" y2="600" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,4"/><rect x="490" y="70" width="100" height="50" rx="6" fill="rgba(241,245,249,0.7)" stroke="#fbbf24" stroke-width="1.2"/><text x="540" y="90" class="h3" text-anchor="middle" fill="#fbbf24">Dexie</text><text x="540" y="104" class="h3" text-anchor="middle" fill="#fbbf24">characterRelations</text><line x1="540" y1="130" x2="540" y2="600" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,4"/><rect x="670" y="70" width="100" height="50" rx="6" fill="rgba(241,245,249,0.7)" stroke="#34d399" stroke-width="1.2"/><text x="720" y="90" class="h3" text-anchor="middle" fill="#34d399">Dedup Util</text><text x="720" y="104" class="h3" text-anchor="middle" fill="#34d399">(memory)</text><line x1="720" y1="130" x2="720" y2="600" stroke="#34d399" stroke-width="1" stroke-dasharray="4,4"/><rect x="830" y="70" width="100" height="50" rx="6" fill="rgba(241,245,249,0.7)" stroke="#fb7185" stroke-width="1.2"/><text x="880" y="90" class="h3" text-anchor="middle" fill="#fb7185">saveDatabase()</text><line x1="880" y1="130" x2="880" y2="600" stroke="#fb7185" stroke-width="1" stroke-dasharray="4,4"/><line x1="60" y1="150" x2="194" y2="150" stroke="#22d3ee" stroke-width="1.5"/><polygon points="200,150 194,154 194,146" fill="#22d3ee"/><text x="212" y="147" class="small" text-anchor="start" fill="#22d3ee">1. 点击「添加关系」</text><line x1="200" y1="180" x2="354" y2="180" stroke="#22d3ee" stroke-width="1.5"/><polygon points="360,180 354,184 354,176" fill="#22d3ee"/><text x="372" y="177" class="small" text-anchor="start" fill="#22d3ee">2. handleAddRelation(payload)</text><line x1="360" y1="215" x2="874" y2="215" stroke="#fb7185" stroke-width="1.5"/><polygon points="880,215 874,219 874,211" fill="#fb7185"/><text x="892" y="212" class="small" text-anchor="start" fill="#fb7185">3. saveDatabase(characters, relations)</text><path d="M 880 255 L 910 255 L 910 267 L 880 267 Z" fill="none" stroke="#fb7185" stroke-width="1.5"/><polygon points="875,261 880,256 880,266" fill="#fb7185"/><text x="892" y="252" class="small" text-anchor="start" fill="#fb7185">4. deleteRelationsCollection(workspaceId)</text><line x1="880" y1="290" x2="726" y2="290" stroke="#34d399" stroke-width="1.5"/><polygon points="720,290 726,286 726,294" fill="#34d399"/><text x="892" y="287" class="small" text-anchor="start" fill="#34d399">5. dedup(relations)  in-memory 去重</text><line x1="720" y1="325" x2="546" y2="325" stroke="#fbbf24" stroke-width="1.5"/><polygon points="540,325 546,321 546,329" fill="#fbbf24"/><text x="732" y="322" class="small" text-anchor="start" fill="#fbbf24">6. relations.bulkAdd(uniques)</text><line x1="540" y1="360" x2="366" y2="360" stroke="#a78bfa" stroke-width="1.5"/><polygon points="360,360 366,356 366,364" fill="#a78bfa"/><text x="552" y="357" class="small" text-anchor="start" fill="#a78bfa">7. setState(relations) 通知订阅者</text><rect x="40" y="395" width="1020" height="80" rx="8" fill="rgba(251,113,133,0.10)" stroke="#fb7185" stroke-width="1.5"/><text x="60" y="418" class="h3" text-anchor="start" fill="#fb7185">⚠ 关键点：步骤 3-6 在 Dexie 事务内串行执行</text><text x="60" y="436" class="small" text-anchor="start">  • 失败回滚：任意步骤 throw → 整个事务回滚 → 数据库保持旧状态</text><text x="60" y="452" class="small" text-anchor="start">  • 幂等保证：重复 addRelation(A→B enemy) 不会产生多条记录（key = (fromId,toId,type) upsert）</text><text x="60" y="468" class="small" text-anchor="start">  • 内存 dedup：按 pair 维度合并同 (from, to, type) 多条记录，保留最后编辑的 label/desc</text><rect x="40" y="495" width="1020" height="100" rx="8" fill="rgba(251,191,36,0.12)" stroke="#fbbf24" stroke-width="1.2"/><text x="60" y="518" class="h3" text-anchor="start" fill="#fbbf24">🛠 我们的改造（最小入侵）</text><text x="60" y="536" class="small" text-anchor="start">Step 1: 抽出 util/dedupRelations(relations)  →  按 (from,to,type) 归并，保留最新 label/desc</text><text x="60" y="552" class="small" text-anchor="start">Step 2: addRelation 改为 upsert（先查重，无则 add，有则 update 字段 + updatedAt）</text><text x="60" y="568" class="small" text-anchor="start">Step 3: processLinks 渲染前 dedup（防御性，避免 store 与 view 状态不一致）</text><text x="60" y="584" class="small" text-anchor="start" fill="#34d399">✓ 不需要 Dexie 事务（不删表），不破坏现有 store 订阅者，零回归风险</text></svg>