<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 660" width="1100" height="660"><style>
    text { font-family: 'SF Mono', 'Cascadia Code', 'Consolas', 'Menlo', 'Monaco', 'Courier New', monospace; fill: #334155; }
  .bg { fill: #ffffff; }
  .title { font-size: 18px; font-weight: 700; fill: #0f172a; }
  .subtitle { font-size: 11px; font-weight: 400; fill: #475569; }
  .h2 { font-size: 12px; font-weight: 600; fill: #1e293b; }
  .h3 { font-size: 10px; font-weight: 600; fill: #1e293b; }
  .label { font-size: 10px; font-weight: 500; fill: #1e293b; }
  .small { font-size: 9px; font-weight: 400; fill: #475569; }
  .tiny { font-size: 8px; font-weight: 400; fill: #64748b; }
</style><rect class="bg" width="1100" height="660"/><text x="20" y="28" class="title" text-anchor="start" fill="#0f172a">#07 Sudowrite / NovelAI 范式：分步确认 vs 一键全自动</text><text x="20" y="44" class="subtitle" text-anchor="start">灵感反推采纳：把"采纳/重试"二选一升级为"卡片抽屉"</text><line x1="20" y1="52" x2="1080" y2="52" stroke="#334155" stroke-width="1"/><text x="20" y="85" class="h3" text-anchor="start" fill="#fb7185">❌ 现状：一键全自动（用户体验最差）</text><rect x="20" y="100" width="510" height="230" rx="8" fill="rgba(251,113,133,0.10)" stroke="#fb7185" stroke-width="1.2"/><text x="34" y="122" class="small" text-anchor="start" fill="#475569">用户操作：</text><text x="34" y="136" class="small" text-anchor="start" fill="#475569">  1. 点「灵感反推」</text><text x="34" y="150" class="small" text-anchor="start" fill="#475569">  2. 等 8 秒</text><text x="34" y="164" class="small" text-anchor="start" fill="#475569">  3. 弹出 12 条关系</text><text x="34" y="178" class="small" text-anchor="start" fill="#475569">  4. 只有「重试 / 好示例 / 反例 / 采纳」4 个按钮</text><text x="34" y="192" class="small" text-anchor="start" fill="#475569">  5. 点「采纳」→ 全部一次性入库</text><text x="34" y="206" class="small" text-anchor="start" fill="#475569"></text><text x="34" y="220" class="small" text-anchor="start" fill="#fb7185">问题：</text><text x="34" y="234" class="small" text-anchor="start" fill="#fb7185">  • 12 条里可能 5 条重复 / 3 条不需要 / 4 条才想采纳</text><text x="34" y="248" class="small" text-anchor="start" fill="#fb7185">  • 用户被迫做 "全要 or 全不要" 的二选一</text><text x="34" y="262" class="small" text-anchor="start" fill="#fb7185">  • 采纳后无法回退 → 钢丝球成因之一</text><text x="34" y="276" class="small" text-anchor="start" fill="#fb7185">  • 反例按钮反馈不闭环（喂给 LLM 训练？缓存？无）</text><text x="560" y="85" class="h3" text-anchor="start" fill="#34d399">✅ Cards Drawer（Sudowrite / NovelAI 范式）</text><rect x="560" y="100" width="520" height="230" rx="8" fill="rgba(52,211,153,0.10)" stroke="#34d399" stroke-width="1.2"/><text x="574" y="122" class="small" text-anchor="start" fill="#475569">用户操作：</text><text x="574" y="136" class="small" text-anchor="start" fill="#475569">  1. 点「灵感反推」</text><text x="574" y="150" class="small" text-anchor="start" fill="#475569">  2. 等 8 秒</text><text x="574" y="164" class="small" text-anchor="start" fill="#475569">  3. 弹出 12 张卡片（Drawer 抽屉式布局）</text><text x="574" y="178" class="small" text-anchor="start" fill="#475569">  4. 每张卡片独立操作：</text><text x="574" y="192" class="small" text-anchor="start" fill="#475569">     ☐ 保留   ✏️ 编辑   🗑 丢弃   ↺ 让 LLM 改写</text><text x="574" y="206" class="small" text-anchor="start" fill="#475569">  5. 顶部工具栏：「采纳选中的 (8)」  ·  「全部采纳」  ·  「取消」</text><text x="574" y="220" class="small" text-anchor="start" fill="#475569"></text><text x="574" y="234" class="small" text-anchor="start" fill="#475569">效果：</text><text x="574" y="248" class="small" text-anchor="start" fill="#475569">  • 颗粒度从 1 个动作（采纳/不采纳）拆为 12 个独立判断</text><text x="574" y="262" class="small" text-anchor="start" fill="#34d399">  • 采纳时只入勾选的 N 条，与现有数据 dedup 后入库</text><text x="574" y="276" class="small" text-anchor="start" fill="#34d399">  • 丢弃的卡片进 "反例库" → 下次 prompt 引用，避免重提</text><text x="20" y="350" class="h2" text-anchor="start" fill="#22d3ee">▍视觉对比：左=一锅端弹层  /  右=Cards Drawer</text><rect x="30" y="380" width="480" height="80" rx="8" fill="rgba(241,245,249,0.7)" stroke="#fb7185" stroke-width="1.2"/><text x="42" y="398" class="h3" text-anchor="start" fill="#475569">关系 1: 林知夏 → 顾承曜 (ally)</text><text x="42" y="416" class="h3" text-anchor="start" fill="#475569">关系 2: 林知夏 → 陆温言 (ally)</text><text x="42" y="434" class="h3" text-anchor="start" fill="#475569">关系 3: 林知夏 → 江临川 (enemy)</text><text x="42" y="452" class="small" text-anchor="start" fill="#475569">... 9 more ...</text><rect x="30" y="470" width="480" height="30" rx="6" fill="rgba(251,113,133,0.10)" stroke="#fb7185" stroke-width="1"/><text x="270" y="490" class="small" text-anchor="middle" fill="#fb7185">  [重试]  [好示例]  [反例]  [采纳]   ← 4 选 1</text><rect x="600" y="380" width="480" height="120" rx="8" fill="rgba(241,245,249,0.7)" stroke="#34d399" stroke-width="1.2"/><rect x="608" y="390" width="464" height="28" rx="4" fill="rgba(248,250,252,0.8)" stroke="#34d399" stroke-width="1"/><rect x="614" y="396" width="14" height="14" rx="3" fill="none" stroke="#34d399" stroke-width="1.2"/><polyline points="616,403 619,407 625,399" fill="none" stroke="#34d399" stroke-width="1.5"/><text x="636" y="408" class="small" text-anchor="start" fill="#475569">关系 1: 林知夏→顾承曜 (ally)</text><text x="960" y="408" class="small" text-anchor="start" fill="#34d399">✏️ 🗑 ↺</text><rect x="608" y="422" width="464" height="28" rx="4" fill="rgba(248,250,252,0.8)" stroke="#34d399" stroke-width="1"/><rect x="614" y="428" width="14" height="14" rx="3" fill="none" stroke="#34d399" stroke-width="1.2"/><polyline points="616,435 619,439 625,431" fill="none" stroke="#34d399" stroke-width="1.5"/><text x="636" y="440" class="small" text-anchor="start" fill="#475569">关系 2: 林知夏→陆温言 (ally)</text><text x="960" y="440" class="small" text-anchor="start" fill="#34d399">✏️ 🗑 ↺</text><rect x="608" y="454" width="464" height="28" rx="4" fill="rgba(248,250,252,0.8)" stroke="#34d399" stroke-width="1"/><rect x="614" y="460" width="14" height="14" rx="3" fill="none" stroke="#34d399" stroke-width="1.2"/><text x="636" y="472" class="small" text-anchor="start" fill="#475569">关系 3: 林知夏→江临川 (enemy)</text><text x="960" y="472" class="small" text-anchor="start" fill="#34d399">✏️ 🗑 ↺</text><rect x="600" y="510" width="480" height="30" rx="6" fill="rgba(52,211,153,0.10)" stroke="#34d399" stroke-width="1"/><text x="840" y="530" class="small" text-anchor="middle" fill="#34d399">  ✓ 采纳选中的 (2)  ·  全选  ·  取消   ← N 选 N</text><rect x="20" y="555" width="1060" height="90" rx="8" fill="rgba(34,211,238,0.10)" stroke="#22d3ee" stroke-width="1.2"/><text x="40" y="578" class="h3" text-anchor="start" fill="#22d3ee">💡 核心启示：AI 生成的内容不应该 "原子提交"，而应该 "卡片可挑" </text><text x="40" y="596" class="small" text-anchor="start">• Sudowrite "Beat Card" / NovelAI "Memory Card" / Notion AI "Block Suggestion" 都是这个范式</text><text x="40" y="612" class="small" text-anchor="start">• 心理负担：用户面对 12 条的全要/全不要 vs 12 条的勾选，前者焦虑、后者轻松</text><text x="40" y="628" class="small" text-anchor="start" fill="#34d399">• 数据层面：颗粒度细 = 重复率 ↓ + 用户掌控感 ↑ + 采纳后后悔率 ↓</text></svg>