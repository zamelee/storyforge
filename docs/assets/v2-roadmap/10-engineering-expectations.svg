</style><rect class="bg" width="1300" height="927"/><text x="20" y="28" class="title" text-anchor="start" fill="#0f172a">#10 工程化预期分析：7 项 v2.0 改动的人天 / 风险 / 回归点</text><text x="20" y="44" class="subtitle" text-anchor="start">动手前必读，避免「先这样吧」式盲改</text><line x1="20" y1="52" x2="1280" y2="52" stroke="#334155" stroke-width="1"/><rect x="20" y="100" width="220" height="30" rx="6" fill="rgba(248,250,252,0.8)" stroke="#22d3ee" stroke-width="1.2"/><text x="28" y="120" class="h3" text-anchor="start" fill="#22d3ee">改动项</text><rect x="240" y="100" width="120" height="30" rx="6" fill="rgba(248,250,252,0.8)" stroke="#22d3ee" stroke-width="1.2"/><text x="248" y="120" class="h3" text-anchor="start" fill="#22d3ee">工作量</text><rect x="360" y="100" width="120" height="30" rx="6" fill="rgba(248,250,252,0.8)" stroke="#22d3ee" stroke-width="1.2"/><text x="368" y="120" class="h3" text-anchor="start" fill="#22d3ee">风险</text><rect x="480" y="100" width="160" height="30" rx="6" fill="rgba(248,250,252,0.8)" stroke="#22d3ee" stroke-width="1.2"/><text x="488" y="120" class="h3" text-anchor="start" fill="#22d3ee">影响范围</text><rect x="640" y="100" width="160" height="30" rx="6" fill="rgba(248,250,252,0.8)" stroke="#22d3ee" stroke-width="1.2"/><text x="648" y="120" class="h3" text-anchor="start" fill="#22d3ee">回归测试点</text><rect x="800" y="100" width="140" height="30" rx="6" fill="rgba(248,250,252,0.8)" stroke="#22d3ee" stroke-width="1.2"/><text x="808" y="120" class="h3" text-anchor="start" fill="#22d3ee">依赖</text><rect x="940" y="100" width="160" height="30" rx="6" fill="rgba(248,250,252,0.8)" stroke="#22d3ee" stroke-width="1.2"/><text x="948" y="120" class="h3" text-anchor="start" fill="#22d3ee">优先级</text><rect x="1100" y="100" width="180" height="30" rx="6" fill="rgba(248,250,252,0.8)" stroke="#22d3ee" stroke-width="1.2"/><text x="1108" y="120" class="h3" text-anchor="start" fill="#22d3ee">回滚预案</text><rect x="20" y="135" width="1260" height="88" rx="4" fill="rgba(248,250,252,0.8)" stroke="#334155" stroke-width="0.8"/><text x="28" y="151" class="small" text-anchor="start" fill="#22d3ee">① addRelation upsert +</text><text x="28" y="164" class="small" text-anchor="start" fill="#22d3ee">   UI 一键去重</text><text x="248" y="151" class="small" text-anchor="start" fill="#475569">1.0 人天</text><text x="368" y="151" class="small" text-anchor="start" fill="#fbbf24">中</text><text x="488" y="151" class="small" text-anchor="start" fill="#475569">useCharacterStore</text><text x="488" y="164" class="small" text-anchor="start" fill="#475569">+ addRelation 调用方</text><text x="488" y="177" class="small" text-anchor="start" fill="#475569">（约 5 处）</text><text x="648" y="151" class="small" text-anchor="start" fill="#34d399">• 重复 add 验证只产生 1 条</text><text x="648" y="164" class="small" text-anchor="start" fill="#34d399">• 现有 53 条不动</text><text x="648" y="177" class="small" text-anchor="start" fill="#34d399">• relations 查询接口签名不变</text><text x="808" y="151" class="small" text-anchor="start" fill="#a78bfa">无（独立）</text><text x="948" y="151" class="small" text-anchor="start" fill="#fb7185">P0</text><text x="1108" y="151" class="small" text-anchor="start" fill="#22d3ee">if (bug) → 改回</text><text x="1108" y="164" class="small" text-anchor="start" fill="#22d3ee">直接 .add 即可</text><rect x="20" y="227" width="1260" height="88" rx="4" fill="rgba(241,245,249,0.7)" stroke="#334155" stroke-width="0.8"/><text x="28" y="243" class="small" text-anchor="start" fill="#22d3ee">② handleAcceptExtracted</text><text x="28" y="256" class="small" text-anchor="start" fill="#22d3ee">   强制跳过 isDuplicate</text><text x="248" y="243" class="small" text-anchor="start" fill="#475569">0.2 人天</text><text x="368" y="243" class="small" text-anchor="start" fill="#34d399">低</text><text x="488" y="243" class="small" text-anchor="start" fill="#475569">灵感反推 onAccept</text><text x="488" y="256" class="small" text-anchor="start" fill="#475569">（1 处）</text><text x="648" y="243" class="small" text-anchor="start" fill="#34d399">• 灵感反推预览里 isDuplicate=true 的项不入库</text><text x="648" y="256" class="small" text-anchor="start" fill="#34d399">• 不影响非反推路径</text><text x="808" y="243" class="small" text-anchor="start" fill="#a78bfa">无（独立）</text><text x="948" y="243" class="small" text-anchor="start" fill="#fb7185">P0</text><text x="1108" y="243" class="small" text-anchor="start" fill="#22d3ee">删 if 即可（一行）</text><rect x="20" y="319" width="1260" height="88" rx="4" fill="rgba(248,250,252,0.8)" stroke="#334155" stroke-width="0.8"/><text x="28" y="335" class="small" text-anchor="start" fill="#22d3ee">③ processLinks 渲染前</text><text x="28" y="348" class="small" text-anchor="start" fill="#22d3ee">   dedup（防御性）</text><text x="248" y="335" class="small" text-anchor="start" fill="#475569">0.3 人天</text><text x="368" y="335" class="small" text-anchor="start" fill="#34d399">低</text><text x="488" y="335" class="small" text-anchor="start" fill="#475569">RelationsGraph 组件</text><text x="488" y="348" class="small" text-anchor="start" fill="#475569">（1 处）</text><text x="648" y="335" class="small" text-anchor="start" fill="#34d399">• 渲染节点数 ≤ store 中的数</text><text x="648" y="348" class="small" text-anchor="start" fill="#34d399">• Canvas 性能 ↓ (期望 ↑)</text><text x="648" y="361" class="small" text-anchor="start" fill="#34d399">• 不改变 store 状态</text><text x="808" y="335" class="small" text-anchor="start" fill="#a78bfa">① 完成后做</text><text x="948" y="335" class="small" text-anchor="start" fill="#fb7185">P0</text><text x="1108" y="335" class="small" text-anchor="start" fill="#22d3ee">删一行 dedup 调用</text><rect x="20" y="411" width="1260" height="88" rx="4" fill="rgba(241,245,249,0.7)" stroke="#334155" stroke-width="0.8"/><text x="28" y="427" class="small" text-anchor="start" fill="#22d3ee">④ UI 渲染改用</text><text x="28" y="440" class="small" text-anchor="start" fill="#22d3ee">   isDirectedType() 映射</text><text x="248" y="427" class="small" text-anchor="start" fill="#475569">1.0 人天</text><text x="368" y="427" class="small" text-anchor="start" fill="#fbbf24">中</text><text x="488" y="427" class="small" text-anchor="start" fill="#475569">RelationsGraph 节点渲染</text><text x="488" y="440" class="small" text-anchor="start" fill="#475569">+ 标签布局</text><text x="488" y="453" class="small" text-anchor="start" fill="#475569">+ 箭头 SVG path</text><text x="648" y="427" class="small" text-anchor="start" fill="#34d399">• 视觉：箭头方向正确</text><text x="648" y="440" class="small" text-anchor="start" fill="#34d399">• 缩放/平移不抖动</text><text x="648" y="453" class="small" text-anchor="start" fill="#34d399">• 已有截图对比</text><text x="808" y="427" class="small" text-anchor="start" fill="#a78bfa">① + ⑤ 完成后</text><text x="948" y="427" class="small" text-anchor="start" fill="#fbbf24">P1</text><text x="1108" y="427" class="small" text-anchor="start" fill="#22d3ee">回滚到 type===</text><text x="1108" y="440" class="small" text-anchor="start" fill="#22d3ee">"ally" 单分支</text><rect x="20" y="503" width="1260" height="88" rx="4" fill="rgba(248,250,252,0.8)" stroke="#334155" stroke-width="0.8"/><text x="28" y="519" class="small" text-anchor="start" fill="#22d3ee">⑤ AI prompt 改造</text><text x="28" y="532" class="small" text-anchor="start" fill="#22d3ee">   （有向不反向）</text><text x="248" y="519" class="small" text-anchor="start" fill="#475569">0.5 人天</text><text x="368" y="519" class="small" text-anchor="start" fill="#fbbf24">中</text><text x="488" y="519" class="small" text-anchor="start" fill="#475569">promptTemplates</text><text x="488" y="532" class="small" text-anchor="start" fill="#475569">+ characterGenPrompt</text><text x="488" y="545" class="small" text-anchor="start" fill="#475569">+ inspirationExtendPrompt</text><text x="648" y="519" class="small" text-anchor="start" fill="#34d399">• 跑 3 组样例 prompt</text><text x="648" y="532" class="small" text-anchor="start" fill="#34d399">  对比输出 JSON 结构</text><text x="648" y="545" class="small" text-anchor="start" fill="#34d399">• 显式关系比例 ≥ 70%</text><text x="808" y="519" class="small" text-anchor="start" fill="#a78bfa">无（独立）</text><text x="948" y="519" class="small" text-anchor="start" fill="#fbbf24">P1</text><text x="1108" y="519" class="small" text-anchor="start" fill="#22d3ee">回滚模板字符串</text><rect x="20" y="595" width="1260" height="88" rx="4" fill="rgba(241,245,249,0.7)" stroke="#334155" stroke-width="0.8"/><text x="28" y="611" class="small" text-anchor="start" fill="#22d3ee">⑥ localStorage history[]</text><text x="28" y="624" class="small" text-anchor="start" fill="#22d3ee">   + currentIndex</text><text x="248" y="611" class="small" text-anchor="start" fill="#475569">1.5 人天</text><text x="368" y="611" class="small" text-anchor="start" fill="#fbbf24">中</text><text x="488" y="611" class="small" text-anchor="start" fill="#475569">InspirationPage</text><text x="488" y="624" class="small" text-anchor="start" fill="#475569">+ ReversePanel</text><text x="488" y="637" class="small" text-anchor="start" fill="#475569">+ 新增 history 工具模块</text><text x="648" y="611" class="small" text-anchor="start" fill="#34d399">• 关闭/重开浏览器能恢复</text><text x="648" y="624" class="small" text-anchor="start" fill="#34d399">• Ctrl+Z 不会越界</text><text x="648" y="637" class="small" text-anchor="start" fill="#34d399">• localStorage 5MB 不爆</text><text x="808" y="611" class="small" text-anchor="start" fill="#a78bfa">⑤ 完成后做</text><text x="948" y="611" class="small" text-anchor="start" fill="#fbbf24">P1</text><text x="1108" y="611" class="small" text-anchor="start" fill="#22d3ee">关掉 history 功能</text><text x="1108" y="624" class="small" text-anchor="start" fill="#22d3ee">开关变量</text><rect x="20" y="687" width="1260" height="88" rx="4" fill="rgba(248,250,252,0.8)" stroke="#334155" stroke-width="0.8"/><text x="28" y="703" class="small" text-anchor="start" fill="#22d3ee">⑦ 注册 inspiration.</text><text x="28" y="716" class="small" text-anchor="start" fill="#22d3ee">   reverse.extend +</text><text x="28" y="729" class="small" text-anchor="start" fill="#22d3ee">   State Injection</text><text x="248" y="703" class="small" text-anchor="start" fill="#475569">1.0 人天</text><text x="368" y="703" class="small" text-anchor="start" fill="#fbbf24">中</text><text x="488" y="703" class="small" text-anchor="start" fill="#475569">promptRegistry</text><text x="488" y="716" class="small" text-anchor="start" fill="#475569">+ extendPrompt 模板</text><text x="488" y="729" class="small" text-anchor="start" fill="#475569">+ handleExtend 调用链</text><text x="648" y="703" class="small" text-anchor="start" fill="#34d399">• 二次扩展能拿到 new + existing</text><text x="648" y="716" class="small" text-anchor="start" fill="#34d399">• Token 数 ≤ 8k</text><text x="648" y="729" class="small" text-anchor="start" fill="#34d399">• 不破坏首次灵感反推</text><text x="808" y="703" class="small" text-anchor="start" fill="#a78bfa">⑤ + ⑥ 完成后</text><text x="948" y="703" class="small" text-anchor="start" fill="#fbbf24">P1</text><text x="1108" y="703" class="small" text-anchor="start" fill="#22d3ee">从 promptRegistry</text><text x="1108" y="716" class="small" text-anchor="start" fill="#22d3ee">移除该模板即可</text><rect x="20" y="787" width="1260" height="90" rx="8" fill="rgba(34,211,238,0.10)" stroke="#22d3ee" stroke-width="1.2"/><text x="40" y="809" class="h3" text-anchor="start" fill="#22d3ee">📊 汇总：7 项改动合计 5.5 人天（其中 P0 = 1.5 人天 / P1 = 4.0 人天）</text><text x="40" y="827" class="small" text-anchor="start">• 风险分布：0 高 / 5 中 / 2 低 —— 全部可通过「开关变量 + 一行回滚」控制</text><text x="40" y="843" class="small" text-anchor="start" fill="#34d399">• 依赖链：① → ③ → ④；⑤ → ⑥ → ⑦；两条链互不阻塞，可并行开发</text><text x="40" y="859" class="small" text-anchor="start" fill="#fbbf24">• 必跑回归：53 条去重后 ≤ 30 条 + 灵感反推 3 组样例 + localStorage 5MB 容量 + 视觉截图对比</text><text x="40" y="875" class="small" text-anchor="start" fill="#fb7185">⚠ 严守 AGENTS.md §5「先停下问一句」：⑤⑥⑦ 涉及 prompt 模板和持久化方案，提交前必须 handoff.md 留痕</text><rect x="20" y="887" width="1260" height="25" rx="4" fill="rgba(251,113,133,0.10)" stroke="#fb7185" stroke-width="0.8"/><text x="650" y="903" class="small" text-anchor="middle" fill="#fb7185">🛑 立刻停下的信号：① 改完后 53 条变成 0 条  ② 关闭浏览器 history 消失  ③ LLM 改完 prompt 后重复率反升 → 立即回滚到上一个 commit</text></svg>