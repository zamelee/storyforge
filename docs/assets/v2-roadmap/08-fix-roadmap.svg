" y="504" class="tiny" text-anchor="start" fill="#fb7185">P2 v7+</text><text x="20" y="539" class="small" text-anchor="start" fill="#475569">L2: RelationType 拆 symmetric/directed 枚举</text><rect x="1013" y="527" width="147" height="16" rx="4" fill="#fb7185" fill-opacity="0.3" stroke="#fb7185" stroke-width="1.2"/><text x="1168" y="539" class="tiny" text-anchor="start" fill="#fb7185">P2 v7+</text><text x="20" y="574" class="small" text-anchor="start" fill="#475569">L3: 数据迁移工具（writeIdempotentMigration）</text><rect x="1062" y="562" width="98" height="16" rx="4" fill="#fb7185" fill-opacity="0.3" stroke="#fb7185" stroke-width="1.2"/><text x="1168" y="574" class="tiny" text-anchor="start" fill="#fb7185">P2 v7+</text><text x="20" y="609" class="small" text-anchor="start" fill="#475569">L4: 后端服务可选接入（TanStack Query + Qdrant）</text><rect x="1111" y="597" width="49" height="16" rx="4" fill="#475569" fill-opacity="0.3" stroke="#475569" stroke-width="1.2"/><text x="1168" y="609" class="tiny" text-anchor="start" fill="#475569">P2 v7+</text><line x1="670" y1="160" x2="670" y2="620" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,4"/><text x="670" y="650" class="h3" text-anchor="middle" fill="#fbbf24">↑ v2.0 短期交付点（关系网不重复 + 灵感反推有后悔药）</text><rect x="20" y="665" width="1160" height="45" rx="6" fill="rgba(34,211,238,0.10)" stroke="#22d3ee" stroke-width="1"/><text x="40" y="685" class="h3" text-anchor="start" fill="#22d3ee">🎯 验收：v2.0 收尾时，刷新 dev 999 验证 characterRelations 53 条记录去重后 ≤ 30 条 且 灵感反推可回退</text><text x="40" y="702" class="small" text-anchor="start" fill="#a78bfa">🛡 安全网：所有短期改动包在 try/catch + 现有 useCharacterStore 订阅者不变；长期 v7+ 改动必须经 AGENTS.md §「先停下问一句」</text></svg>