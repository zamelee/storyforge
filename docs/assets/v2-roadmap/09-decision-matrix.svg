</style><rect class="bg" width="1200" height="720"/><text x="20" y="28" class="title" text-anchor="start" fill="#0f172a">#09 决策卡：一页纸看懂 v2.0 全部 7 项改动</text><text x="20" y="44" class="subtitle" text-anchor="start">问题 → 短期方案 → 长期方案 → 借鉴来源 → 工程化预期</text><line x1="20" y1="52" x2="1180" y2="52" stroke="#334155" stroke-width="1"/><rect x="20" y="100" width="220" height="30" rx="6" fill="rgba(248,250,252,0.8)" stroke="#22d3ee" stroke-width="1.2"/><text x="30" y="120" class="h3" text-anchor="start" fill="#22d3ee">问题</text><rect x="240" y="100" width="220" height="30" rx="6" fill="rgba(248,250,252,0.8)" stroke="#22d3ee" stroke-width="1.2"/><text x="250" y="120" class="h3" text-anchor="start" fill="#22d3ee">短期 v2.0 (零破坏)</text><rect x="460" y="100" width="240" height="30" rx="6" fill="rgba(248,250,252,0.8)" stroke="#22d3ee" stroke-width="1.2"/><text x="470" y="120" class="h3" text-anchor="start" fill="#22d3ee">长期 v7+ (schema 升级)</text><rect x="700" y="100" width="200" height="30" rx="6" fill="rgba(248,250,252,0.8)" stroke="#22d3ee" stroke-width="1.2"/><text x="710" y="120" class="h3" text-anchor="start" fill="#22d3ee">借鉴源</text><rect x="900" y="100" width="280" height="30" rx="6" fill="rgba(248,250,252,0.8)" stroke="#22d3ee" stroke-width="1.2"/><text x="910" y="120" class="h3" text-anchor="start" fill="#22d3ee">预期 ROI</text><rect x="20" y="135" width="1160" height="74" rx="4" fill="rgba(248,250,252,0.8)" stroke="#334155" stroke-width="0.8"/><text x="30" y="151" class="small" text-anchor="start" fill="#fb7185">关系网「钢丝球」</text><text x="30" y="164" class="small" text-anchor="start" fill="#fb7185">(id 3/35/41 共用 pair+type)</text><text x="250" y="151" class="small" text-anchor="start" fill="#34d399">addRelation upsert + dedup util</text><text x="250" y="164" class="small" text-anchor="start" fill="#34d399">(bibisco 模式)</text><text x="470" y="151" class="small" text-anchor="start" fill="#fbbf24">RelationType 拆 symmetric / directed</text><text x="470" y="164" class="small" text-anchor="start" fill="#fbbf24">删 isBidirectional 字段</text><text x="710" y="151" class="small" text-anchor="start" fill="#a78bfa">bibisco 761★</text><text x="710" y="164" class="small" text-anchor="start" fill="#a78bfa">(angular)</text><text x="910" y="151" class="small" text-anchor="start" fill="#22d3ee">P0 / 1人天</text><text x="910" y="164" class="small" text-anchor="start" fill="#22d3ee">减重 40%</text><rect x="20" y="213" width="1160" height="74" rx="4" fill="rgba(241,245,249,0.7)" stroke="#334155" stroke-width="0.8"/><text x="30" y="229" class="small" text-anchor="start" fill="#fb7185">processLinks 渲染时</text><text x="30" y="242" class="small" text-anchor="start" fill="#fb7185">才 dedup，性能差</text><text x="250" y="229" class="small" text-anchor="start" fill="#34d399">processLinks 入口 dedup</text><text x="250" y="242" class="small" text-anchor="start" fill="#34d399">(防御性，不依赖 store)</text><text x="470" y="229" class="small" text-anchor="start" fill="#fbbf24">useMemo 缓存</text><text x="470" y="242" class="small" text-anchor="start" fill="#fbbf24">+ indexed lookup</text><text x="710" y="229" class="small" text-anchor="start" fill="#a78bfa">React 18</text><text x="710" y="242" class="small" text-anchor="start" fill="#a78bfa">useMemo</text><text x="910" y="229" class="small" text-anchor="start" fill="#22d3ee">P0 / 0.5人天</text><text x="910" y="242" class="small" text-anchor="start" fill="#22d3ee">性能 ↑30%</text><rect x="20" y="291" width="1160" height="74" rx="4" fill="rgba(248,250,252,0.8)" stroke="#334155" stroke-width="0.8"/><text x="30" y="307" class="small" text-anchor="start" fill="#fb7185">handleAcceptExtracted</text><text x="30" y="320" class="small" text-anchor="start" fill="#fb7185">把 isDuplicate 也入库</text><text x="250" y="307" class="small" text-anchor="start" fill="#34d399">跳过 isDuplicate === true</text><text x="250" y="320" class="small" text-anchor="start" fill="#34d399">(一行 if 过滤)</text><text x="470" y="307" class="small" text-anchor="start" fill="#fbbf24">— (短期已根治)</text><text x="710" y="307" class="small" text-anchor="start" fill="#a78bfa">—</text><text x="910" y="307" class="small" text-anchor="start" fill="#22d3ee">P0 / 0.2人天</text><text x="910" y="320" class="small" text-anchor="start" fill="#22d3ee">立即止血</text><rect x="20" y="369" width="1160" height="74" rx="4" fill="rgba(241,245,249,0.7)" stroke="#334155" stroke-width="0.8"/><text x="30" y="385" class="small" text-anchor="start" fill="#fb7185">UI 把所有关系</text><text x="30" y="398" class="small" text-anchor="start" fill="#fb7185">渲染成无向线</text><text x="250" y="385" class="small" text-anchor="start" fill="#34d399">isDirectedType(type)</text><text x="250" y="398" class="small" text-anchor="start" fill="#34d399">映射表查渲染方式</text><text x="470" y="385" class="small" text-anchor="start" fill="#fbbf24">RelationType enum</text><text x="470" y="398" class="small" text-anchor="start" fill="#fbbf24">内置 isSymmetric</text><text x="710" y="385" class="small" text-anchor="start" fill="#a78bfa">relation-graph 2265★</text><text x="710" y="398" class="small" text-anchor="start" fill="#a78bfa">(line schema)</text><text x="910" y="385" class="small" text-anchor="start" fill="#22d3ee">P1 / 1人天</text><text x="910" y="398" class="small" text-anchor="start" fill="#22d3ee">视觉还原</text><rect x="20" y="447" width="1160" height="74" rx="4" fill="rgba(248,250,252,0.8)" stroke="#334155" stroke-width="0.8"/><text x="30" y="463" class="small" text-anchor="start" fill="#fb7185">AI prompt 没约束</text><text x="30" y="476" class="small" text-anchor="start" fill="#fb7185">"不输出已存在关系"</text><text x="250" y="463" class="small" text-anchor="start" fill="#34d399">existing_context</text><text x="250" y="476" class="small" text-anchor="start" fill="#34d399">注入到 prompt 头部</text><text x="470" y="463" class="small" text-anchor="start" fill="#fbbf24">— (短期已根治)</text><text x="710" y="463" class="small" text-anchor="start" fill="#a78bfa">Gemini 第一轮</text><text x="710" y="476" class="small" text-anchor="start" fill="#a78bfa">+ open-canvas</text><text x="910" y="463" class="small" text-anchor="start" fill="#22d3ee">P1 / 0.5人天</text><text x="910" y="476" class="small" text-anchor="start" fill="#22d3ee">重复率 ↓ 35%</text><rect x="20" y="525" width="1160" height="74" rx="4" fill="rgba(241,245,249,0.7)" stroke="#334155" stroke-width="0.8"/><text x="30" y="541" class="small" text-anchor="start" fill="#fb7185">灵感反推采纳后</text><text x="30" y="554" class="small" text-anchor="start" fill="#fb7185">无后悔药</text><text x="250" y="541" class="small" text-anchor="start" fill="#34d399">history[] + currentIndex</text><text x="250" y="554" class="small" text-anchor="start" fill="#34d399">+ localStorage 持久化</text><text x="470" y="541" class="small" text-anchor="start" fill="#fbbf24">云端 history 同步</text><text x="470" y="554" class="small" text-anchor="start" fill="#fbbf24">(需后端就绪后)</text><text x="710" y="541" class="small" text-anchor="start" fill="#a78bfa">open-canvas 5.5k★</text><text x="710" y="554" class="small" text-anchor="start" fill="#a78bfa">ArtifactV3</text><text x="910" y="541" class="small" text-anchor="start" fill="#22d3ee">P1 / 2人天</text><text x="910" y="554" class="small" text-anchor="start" fill="#22d3ee">用户掌控感 ↑</text><rect x="20" y="603" width="1160" height="74" rx="4" fill="rgba(248,250,252,0.8)" stroke="#334155" stroke-width="0.8"/><text x="30" y="619" class="small" text-anchor="start" fill="#fb7185">灵感反推</text><text x="30" y="632" class="small" text-anchor="start" fill="#fb7185">无法追加扩展</text><text x="250" y="619" class="small" text-anchor="start" fill="#34d399">inspiration.reverse.extend</text><text x="250" y="632" class="small" text-anchor="start" fill="#34d399">+ State Injection</text><text x="470" y="619" class="small" text-anchor="start" fill="#fbbf24">multi-turn context window</text><text x="470" y="632" class="small" text-anchor="start" fill="#fbbf24">(同 history[] 复用)</text><text x="710" y="619" class="small" text-anchor="start" fill="#a78bfa">open-canvas 5.5k★</text><text x="710" y="632" class="small" text-anchor="start" fill="#a78bfa">+ Gemini 多轮</text><text x="910" y="619" class="small" text-anchor="start" fill="#22d3ee">P1 / 1.5人天</text><text x="910" y="632" class="small" text-anchor="start" fill="#22d3ee">AI 扩展能力 +</text><rect x="20" y="691" width="1160" height="80" rx="8" fill="rgba(34,211,238,0.10)" stroke="#22d3ee" stroke-width="1.2"/><text x="40" y="713" class="h3" text-anchor="start" fill="#22d3ee">📋 决策摘要</text><text x="40" y="731" class="small" text-anchor="start">• 短期 v2.0 共 6.7 人天，全部包在 useCharacterStore 现有订阅者之下，零破坏</text><text x="40" y="747" class="small" text-anchor="start">• 长期 v7+ 4 项必须 schema 升级 + 数据迁移，按 zamelee/storyforge 主线节奏，不与本对话抢跑</text><text x="40" y="763" class="small" text-anchor="start" fill="#a78bfa">• 借鉴源以 bibisco / open-canvas 为主，storm 30k★ 仅作流程参考，关系图视觉借鉴 relation-graph</text></svg>